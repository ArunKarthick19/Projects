<!DOCTYPE html>
<html>
<head><title>Reset Password</title></head>
<body>
<h2>Reset Password</h2>
<div id="message"></div>
<form id="resetForm">
    <input type="hidden" name="token" id="token">
    <label>New Password: <input type="password" id="new_password" required></label>
    <button type="submit">Reset Password</button>
</form>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        document.getElementById('token').value = token;
    } else {
        document.getElementById('message').innerText = 'No token provided.';
    }
    document.getElementById('resetForm').onsubmit = async (e) => {
        e.preventDefault();
        const new_pass = document.getElementById('new_password').value;
        const res = await fetch('/backend.php?action=reset_password', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `token=${token}&new_password=${encodeURIComponent(new_pass)}`
        });
        const data = await res.json();
        document.getElementById('message').innerText = data.message;
        if (data.success) window.location.href = '/';
    };
</script>
</body>
</html>
