<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureBank – Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            width: 400px;
            padding: 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .logo h1 { color: #1e2a3a; text-align: center; margin-bottom: 8px; }
        .vuln-badge {
            background: #e9ecef;
            color: #a61e2f;
            padding: 8px;
            border-radius: 40px;
            font-size: 12px;
            text-align: center;
            margin: 20px 0;
            border-left: 3px solid #a61e2f;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .input-group input { width: 100%; padding: 12px; border: 1.5px solid #d4dee2; border-radius: 12px; }
        button {
            width: 100%; padding: 12px;
            background: #2c5a7a; color: white;
            border: none; border-radius: 40px;
            font-weight: 600; cursor: pointer;
        }
        button:hover { background: #1f405a; }
        .forgot-link { text-align: right; margin-top: 8px; font-size: 13px; }
        .forgot-link a { color: #2c5a7a; text-decoration: none; }
        .info-box {
            margin-top: 20px; padding: 12px;
            background: #f8f9fa; border-left: 3px solid #8ba0ae;
            font-size: 12px;
        }
        .alert { padding: 10px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .alert.error { background: #ffe6e5; color: #b33c2f; }
        .alert.success { background: #e1f7e8; color: #1e6f3f; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px; width: 350px;
        }
        .debug {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            background: #f4f4f4;
            padding: 8px;
            border-radius: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo"><h1>SecureBank</h1></div>
    <div class="vuln-badge">OpenSSL 1.0.1f – Heartbleed vulnerable</div>
    <div id="alert" class="alert"></div>
    <form id="loginForm">
        <div class="input-group"><label>Username</label><input type="text" id="username" required autocomplete="off"></div>
        <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit">Login</button>
        <div class="forgot-link"><a href="#" id="forgotBtn">Forgot password?</a></div>
    </form>
    <div class="info-box">
        During authentication, credentials and session tokens may reside in server memory.
    </div>
    <div id="debug" class="debug">Ready</div>
</div>

<!-- Forgot password modal -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <h3>Reset Password</h3>
        <input type="text" id="resetUsername" placeholder="Username" style="width:100%; margin:10px 0; padding:8px;">
        <button id="sendResetBtn">Send reset request</button>
        <div id="resetMsg" style="margin-top:10px; font-size:12px;"></div>
        <button onclick="closeModal()" style="margin-top:10px; background:#ccc;">Close</button>
    </div>
</div>

<script>
    const modal = document.getElementById('forgotModal');
    document.getElementById('forgotBtn').onclick = () => modal.style.display = 'flex';
    window.closeModal = () => modal.style.display = 'none';

    document.getElementById('sendResetBtn').onclick = async () => {
        const username = document.getElementById('resetUsername').value;
        const res = await fetch('/backend.php?action=forgot_password', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `username=${encodeURIComponent(username)}`
        });
        const data = await res.json();
        document.getElementById('resetMsg').innerText = data.message;
        if (data.success) setTimeout(() => closeModal(), 2000);
    };

    const loginForm = document.getElementById('loginForm');
    const alertDiv = document.getElementById('alert');
    const debugDiv = document.getElementById('debug');

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        alertDiv.style.display = 'none';
        debugDiv.innerText = 'Sending request to /backend.php...';
        
        try {
            const response = await fetch('/backend.php?action=login', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            });
            
            const data = await response.json();
            debugDiv.innerText = `Response: ${JSON.stringify(data)}`;
            
            if (data.success) {
                alertDiv.className = 'alert success';
                alertDiv.style.display = 'block';
                alertDiv.innerText = 'Login successful. Redirecting...';
                localStorage.setItem('username', username);
                localStorage.setItem('role', data.role || 'user');
                
                // Redirect based on role
                setTimeout(() => {
                    if (data.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 1000);
            } else {
                alertDiv.className = 'alert error';
                alertDiv.style.display = 'block';
                alertDiv.innerText = data.message || 'Invalid username or password';
                setTimeout(() => alertDiv.style.display = 'none', 3000);
            }
        } catch (err) {
            debugDiv.innerText = `Fetch error: ${err.message}`;
            alertDiv.className = 'alert error';
            alertDiv.style.display = 'block';
            alertDiv.innerText = 'Network error - cannot reach server';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
        }
    };
</script>
</body>
</html>
