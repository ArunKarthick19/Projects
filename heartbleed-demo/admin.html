<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel – SecureBank</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; padding: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c5a7a; color: white; }
        button { background: #2c5a7a; color: white; border: none; padding: 5px 10px; border-radius: 20px; cursor: pointer; }
        .delete-btn { background: #a61e2f; }
        .add-form { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 10px; }
        input { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Admin Panel</h1>
    <p>Logged in as: <span id="adminName"></span></p>
    <div class="add-form">
        <h3>Add Funds to User</h3>
        <input type="text" id="targetUser" placeholder="Username">
        <input type="number" id="amount" placeholder="Amount">
        <button id="addFundsBtn">Add Funds</button>
        <span id="addMsg"></span>
    </div>
    <div class="add-form">
        <h3>Delete User (cannot delete admin)</h3>
        <input type="text" id="deleteUser" placeholder="Username">
        <button id="deleteUserBtn" class="delete-btn">Delete User</button>
        <span id="deleteMsg"></span>
    </div>
    <h3>All Users</h3>
    <table id="userTable">
        <thead><tr><th>Username</th><th>Balance</th></tr></thead>
        <tbody></tbody>
    </table>
    <button onclick="logout()">Logout</button>
</div>
<script>
    const username = localStorage.getItem('username');
    if (username !== 'admin') window.location.href = '/dashboard.html';
    document.getElementById('adminName').innerText = username;

    async function loadUsers() {
        const res = await fetch('/backend.php?action=list_users');
        const data = await res.json();
        if (data.success) {
            const tbody = document.querySelector('#userTable tbody');
            tbody.innerHTML = '';
            data.users.forEach(u => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = u.username;
                row.insertCell(1).innerText = '$' + u.balance;
            });
        }
    }
    loadUsers();

    document.getElementById('addFundsBtn').onclick = async () => {
        const target = document.getElementById('targetUser').value;
        const amount = document.getElementById('amount').value;
        const res = await fetch('/backend.php?action=add_funds', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `target=${encodeURIComponent(target)}&amount=${amount}`
        });
        const data = await res.json();
        document.getElementById('addMsg').innerText = data.message || (data.success ? 'Added' : 'Error');
        if (data.success) loadUsers();
    };

    document.getElementById('deleteUserBtn').onclick = async () => {
        const target = document.getElementById('deleteUser').value;
        if (!confirm(`Delete user ${target}?`)) return;
        const res = await fetch('/backend.php?action=delete_user', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `target=${encodeURIComponent(target)}`
        });
        const data = await res.json();
        document.getElementById('deleteMsg').innerText = data.message;
        if (data.success) loadUsers();
    };

    function logout() { localStorage.clear(); window.location.href = '/'; }
</script>
</body>
</html>
